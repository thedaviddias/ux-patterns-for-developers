pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{js,jsx,ts,tsx,json}"
      run: pnpm exec biome format --write {staged_files}
    lint:
      glob: "*.{js,jsx,ts,tsx}"
      run: pnpm exec biome lint {staged_files}
    organize-imports:
      glob: "*.{js,jsx,ts,tsx}"
      run: pnpm exec biome check --write {staged_files}
    generate-pattern-skills:
      glob: "apps/web/content/patterns/**/*.mdx"
      run: |
        pnpm skills:generate &&
        git add apps/web/.generated/pattern-skills.json skills/
    sync-gallery-metadata:
      glob: "apps/gallery/content/entries/**/*.mdx"
      run: |
        cd apps/gallery && 
        pnpm tsx scripts/sync-websites-metadata.ts && 
        pnpm tsx scripts/extract-favicon-colors.ts &&
        git add data/websites.json
